name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_1oNliDboVh2cp2ffS5F5e2CQ
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Link and Pull
        run: |
          vercel link --yes --token=$VERCEL_TOKEN --project=trendlair
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN || true

      - name: Build
        run: |
          set +e
          vercel build --prod --token=$VERCEL_TOKEN
          if [ -d ".vercel/output" ]; then
            echo "✅ Build output confirmed"
            exit 0
          else
            exit 1
          fi

      - name: Deploy
        run: |
          DEPLOY_OUT=$(vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "Deploy: $DEPLOY_OUT"
          echo "$DEPLOY_OUT" | grep -q "https://" && echo "✅ Deployed" || echo "⚠️ No URL but may have succeeded"
          exit 0
