name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_1oNliDboVh2cp2ffS5F5e2CQ
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Link project and pull env vars
        run: |
          vercel link --yes --token=$VERCEL_TOKEN --project=trendlair
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (attempt 1)
        id: deploy_1
        run: vercel deploy --prod --token=$VERCEL_TOKEN
        continue-on-error: true

      - name: Deploy to Vercel (attempt 2)
        if: steps.deploy_1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed — retrying in 30s..."
          sleep 30
          vercel deploy --prod --token=$VERCEL_TOKEN
