name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_1oNliDboVh2cp2ffS5F5e2CQ
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Link project
        run: vercel link --yes --token=$VERCEL_TOKEN --project=trendlair

      - name: Pull env vars
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN || true

      - name: Build with Next.js
        run: npm run build

      - name: Deploy
        run: |
          DEPLOY_OUT=$(vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "$DEPLOY_OUT"
          exit 0
